[pytest]
testpaths = agentic_reliability_framework/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --strict-markers --tb=short --cov=agentic_reliability_framework --cov-report=term-missing --cov-report=html
markers =
    unit: Unit tests (fast)
    integration: Tests that require external dependencies
    slow: Tests that take longer to run
